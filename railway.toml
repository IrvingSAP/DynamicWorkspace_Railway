[build]
builder = "NIXPACKS"
# Estáticos una vez por deploy (no en cada arranque del proceso web).
buildCommand = "DJANGO_SETTINGS_MODULE=dynamicworkspace.production python manage.py collectstatic --noinput"

[deploy]
# Migraciones en release; el proceso web solo sirve con Gunicorn (gthread).
releaseCommand = "DJANGO_SETTINGS_MODULE=dynamicworkspace.production python manage.py migrate --noinput"
startCommand = "DJANGO_SETTINGS_MODULE=dynamicworkspace.production gunicorn -c gunicorn.conf.py dynamicworkspace.wsgi:application"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
